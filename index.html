<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        const lang = navigator.language || navigator.userLanguage;
        if (lang.startsWith('ja')) {
            window.location.replace('/ja/');
        } else {
            window.location.replace('/en/');
        }
    </script>
</head>
<body>
</body>
</html>
